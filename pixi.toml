[workspace]
name = "subdetect"
authors = ["ly0n <tobiasaugspurger@gmail.com>"]
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.11.*"
# OSM ingestion: Geofabrik PBF -> osmium extract/tags-filter/export (no Overpass).
osmium-tool = "*"

# Default env: data pipeline (osm, roi, compose, chips, postprocess, export).
# The heavy ML stack (torch cu126 + terratorch) lives in the `ml` feature so
# data work doesn't wait on a multi-GB solve.
[pypi-dependencies]
subdetect = { path = ".", editable = true }
duckdb = ">=1.1"
geopandas = ">=1.0"
pyarrow = ">=15"
shapely = ">=2.0"
rasterio = ">=1.3"
rioxarray = "*"
xarray = "*"
odc-stac = "*"
pystac-client = "*"
planetary-computer = "*"
pyogrio = "*"
typer = "*"
pyyaml = "*"
matplotlib = "*"
tqdm = "*"

[feature.ml.pypi-dependencies]
# GTX 1060 (Pascal, sm_61): CUDA 13 dropped Pascal, so pin cu126 wheels.
torch = { version = "==2.7.1", index = "https://download.pytorch.org/whl/cu126" }
torchvision = { version = "==0.22.1", index = "https://download.pytorch.org/whl/cu126" }
terratorch = ">=1.0"

[environments]
default = { solve-group = "default" }
ml = { features = ["ml"], solve-group = "default" }

[tasks]
osm = "python -m subdetect.cli osm"
roi = "python -m subdetect.cli roi"
compose = "python -m subdetect.cli compose"
chips = "python -m subdetect.cli chips"
postprocess = "python -m subdetect.cli postprocess"
export = "python -m subdetect.cli export"

[feature.ml.tasks]
train = "python -m subdetect.cli train"
evaluate = "python -m subdetect.cli evaluate"
infer = "python -m subdetect.cli infer"
gpu-check = "python -c 'import torch; print(torch.__version__, torch.cuda.is_available(), torch.cuda.get_device_name(0))'"
