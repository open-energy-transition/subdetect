# v8: voltage-tag oversampling ablation. Same recipe as v5 (india_pilot + pakistan:2 +
# pakistan_hardneg, no yunnan_hardneg, no size floor, raw/unrefined labels) but chips
# built with --voltage-weight 2: substations with a valid OSM voltage tag get 2 jittered
# chip samples instead of 1, while untagged ones still get their normal 1 (kept as
# regular positives, not excluded). This is the non-destructive alternative to v7
# (--voltage-only), which cut the training set by 57% and caused a severe data-starvation
# regression (IoU 0.236->0.158, fp more than doubled, sindh_test P@50 0.38->0.12). v8
# keeps v5's full positive volume (6,412 chips vs v5's 4,730 -- MORE, not less, since
# tagged substations get extra copies on top of the base set) while still giving the more
# reliably-drawn tagged substations more training weight. Compare against v5/v6b/v6c/v7
# via evaluate.py + eval_polygonize_v2.py on sindh_test, same methodology throughout.
data:
  index_path: data/chips_v8/combined/index.parquet
  batch_size: 8
  num_workers: 4
  modalities: [S1RTC]

task:
  model_factory: EncoderDecoderFactory
  model_args:
    backbone: terramind_v1_tiny
    backbone_pretrained: true
    backbone_modalities: [S1RTC]
    backbone_bands:
      S1RTC: [VV, VH]
    necks:
      - name: SelectIndices
        indices: [2, 5, 8, 11]
      - name: ReshapeTokensToImage
        remove_cls_token: false
      - name: LearnedInterpolateToPyramidal
    decoder: UNetDecoder
    decoder_channels: [256, 128, 64, 32]
    num_classes: 2
    rescale: true
  loss: tversky
  tversky_args: {alpha: 0.35, beta: 0.65, gamma: 1.33}
  class_weights: [0.25, 0.75]
  ignore_index: -1
  lr: 1.0e-4
  optimizer: AdamW
  optimizer_hparams:
    weight_decay: 0.05
  freeze_backbone: false
  plot_on_val: false

trainer:
  max_epochs: 60
  accumulate_grad_batches: 2

checkpoint_dir: data/models/stageA_v8_s1only
patience: 15
monitor: val/mIoU
monitor_mode: max
