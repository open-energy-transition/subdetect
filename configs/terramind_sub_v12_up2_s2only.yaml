# v12 up2: v11's exact index/recipe with 2x bicubic input upsampling (on-the-fly in
# SubChipDataset, data.upsample: 2 -- masks nearest-upsampled). ONE variable vs v11.
#
# Hypothesis (see the 2026-07-19 super-resolution discussion + the small-sub audit):
# the <2,000 m2 recall floor (0/15 in eval_small_subs.py) is a TOKEN-GRANULARITY
# limit, not an optics limit -- a 45x45 m yard is sub-token for a 16 px ViT patch at
# 10 m (one token = 160 m). Upsampling adds no information but quadruples tokens on
# the object. Judge on eval_small_subs.py size buckets + field_eval.py (sindh_test),
# NOT val/mIoU (split unchanged vs v11 but pixel counts scale with upsampling).
#
# Memory: 448 px inputs on the GTX 1060 (6 GB) -> batch 2 + accumulate 8 keeps the
# effective batch at 16. Expect ~4x slower epochs than v11.
# NOTE inference must mirror the upsampling: predict on 2x-upsampled windows and
# downsample the prob map (not yet wired into infer.py / infer_fused_aoi.py).
data:
  index_path: data/chips_v11/combined/index.parquet
  batch_size: 2
  num_workers: 4
  modalities: [S2L2A]
  upsample: 2

task:
  model_factory: EncoderDecoderFactory
  model_args:
    backbone: terramind_v1_tiny
    backbone_pretrained: true
    backbone_modalities: [S2L2A]
    backbone_bands:
      S2L2A: [BLUE, GREEN, RED, RED_EDGE_1, RED_EDGE_2, RED_EDGE_3,
              NIR_BROAD, NIR_NARROW, SWIR_1, SWIR_2]
    necks:
      - name: SelectIndices
        indices: [2, 5, 8, 11]
      - name: ReshapeTokensToImage
        remove_cls_token: false
      - name: LearnedInterpolateToPyramidal
    decoder: UNetDecoder
    decoder_channels: [256, 128, 64, 32]
    num_classes: 2
    rescale: true
  loss: tversky
  tversky_args: {alpha: 0.35, beta: 0.65, gamma: 1.33}
  class_weights: [0.25, 0.75]
  ignore_index: -1
  lr: 1.0e-4
  optimizer: AdamW
  optimizer_hparams:
    weight_decay: 0.05
  freeze_backbone: false
  plot_on_val: false

trainer:
  max_epochs: 60
  accumulate_grad_batches: 8

checkpoint_dir: data/models/stageA_v12_up2_s2only
patience: 15
monitor: val/mIoU
monitor_mode: max
