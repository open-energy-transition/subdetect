# v4 fusion experiment — TREATMENT arm: S2 + S1RTC dual-modality, fresh from
# TerraMind pretrained. Single-variable delta vs terramind_sub_v4_s2only.yaml:
# adds the S1RTC modality (VV/VH patch-embed, tokens merged by mean); batch halved
# + grad accumulation doubled to keep effective batch 16 on the 6 GB GTX 1060.
# modality_drop_rate 0.1 -> tolerates cells with missing/degraded S1 at inference.

data:
  index_path: data/chips/combined/index.parquet
  batch_size: 4
  num_workers: 4
  modalities: [S2L2A, S1RTC]

task:
  model_factory: EncoderDecoderFactory
  model_args:
    backbone: terramind_v1_tiny
    backbone_pretrained: true
    backbone_modalities: [S2L2A, S1RTC]
    backbone_bands:
      S2L2A: [BLUE, GREEN, RED, RED_EDGE_1, RED_EDGE_2, RED_EDGE_3,
              NIR_BROAD, NIR_NARROW, SWIR_1, SWIR_2]
      S1RTC: [VV, VH]
    backbone_modality_drop_rate: 0.1
    necks:
      - name: SelectIndices
        indices: [2, 5, 8, 11]
      - name: ReshapeTokensToImage
        remove_cls_token: false
      - name: LearnedInterpolateToPyramidal
    decoder: UNetDecoder
    decoder_channels: [256, 128, 64, 32]
    num_classes: 2
    rescale: true
  loss: tversky
  tversky_args: {alpha: 0.35, beta: 0.65, gamma: 1.33}
  class_weights: [0.25, 0.75]
  ignore_index: -1
  lr: 1.0e-4
  optimizer: AdamW
  optimizer_hparams:
    weight_decay: 0.05
  freeze_backbone: false
  plot_on_val: false

trainer:
  max_epochs: 60
  accumulate_grad_batches: 4

checkpoint_dir: data/models/stageA_v4_s1fusion
patience: 15
monitor: val/mIoU
monitor_mode: max
