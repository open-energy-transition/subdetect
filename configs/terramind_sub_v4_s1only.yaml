# v4 fusion experiment — third arm: S1RTC ONLY, fresh from TerraMind pretrained.
# Completes the ablation triangle vs terramind_sub_v4_{s2only,s1fusion}.yaml:
# same chips/loss/schedule, input is just the 2-band VV/VH dry-season composite.
# Single modality -> no modality drop; token count as S2-only -> batch 8.

data:
  index_path: data/chips/combined/index.parquet
  batch_size: 8
  num_workers: 4
  modalities: [S1RTC]

task:
  model_factory: EncoderDecoderFactory
  model_args:
    backbone: terramind_v1_tiny
    backbone_pretrained: true
    backbone_modalities: [S1RTC]
    backbone_bands:
      S1RTC: [VV, VH]
    necks:
      - name: SelectIndices
        indices: [2, 5, 8, 11]
      - name: ReshapeTokensToImage
        remove_cls_token: false
      - name: LearnedInterpolateToPyramidal
    decoder: UNetDecoder
    decoder_channels: [256, 128, 64, 32]
    num_classes: 2
    rescale: true
  loss: tversky
  tversky_args: {alpha: 0.35, beta: 0.65, gamma: 1.33}
  class_weights: [0.25, 0.75]
  ignore_index: -1
  lr: 1.0e-4
  optimizer: AdamW
  optimizer_hparams:
    weight_decay: 0.05
  freeze_backbone: false
  plot_on_val: false

trainer:
  max_epochs: 60
  accumulate_grad_batches: 2

checkpoint_dir: data/models/stageA_v4_s1only
patience: 15
monitor: val/mIoU
monitor_mode: max
