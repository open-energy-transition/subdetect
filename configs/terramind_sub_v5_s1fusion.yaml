# v5: S2+S1RTC mid-fusion, NO substation size floor (min_area_m2=0 at chip build).
# Tests whether v4_s1fusion's loss to s1only (IoU 0.266 vs 0.310, 63% vs 84%
# >=20k recall) was the mean-merge architecture diluting signal, or simply the
# same data-starved floor=20k regime that v5_s1only just beat by a wide margin
# (IoU 0.125->0.236, fp 70658->16620, >=20k recall UNCHANGED at 71.4%) with no
# architecture change. Identical arch/loss/schedule to v4_s1fusion; only the
# chip index changes. If this still loses to v5_s1only, the merge mechanism is
# confirmed as the bottleneck (try concat-merge next); if it closes the gap or
# wins, the old ablation was confounded by data starvation, not architecture.
# NOTE val/mIoU is NOT comparable to v4 -- compare via evaluate.py size buckets.
data:
  index_path: data/chips_v5/combined/index.parquet
  batch_size: 4
  num_workers: 4
  modalities: [S2L2A, S1RTC]

task:
  model_factory: EncoderDecoderFactory
  model_args:
    backbone: terramind_v1_tiny
    backbone_pretrained: true
    backbone_modalities: [S2L2A, S1RTC]
    backbone_bands:
      S2L2A: [BLUE, GREEN, RED, RED_EDGE_1, RED_EDGE_2, RED_EDGE_3,
              NIR_BROAD, NIR_NARROW, SWIR_1, SWIR_2]
      S1RTC: [VV, VH]
    backbone_modality_drop_rate: 0.1
    necks:
      - name: SelectIndices
        indices: [2, 5, 8, 11]
      - name: ReshapeTokensToImage
        remove_cls_token: false
      - name: LearnedInterpolateToPyramidal
    decoder: UNetDecoder
    decoder_channels: [256, 128, 64, 32]
    num_classes: 2
    rescale: true
  loss: tversky
  tversky_args: {alpha: 0.35, beta: 0.65, gamma: 1.33}
  class_weights: [0.25, 0.75]
  ignore_index: -1
  lr: 1.0e-4
  optimizer: AdamW
  optimizer_hparams:
    weight_decay: 0.05
  freeze_backbone: false
  plot_on_val: false

trainer:
  max_epochs: 60
  accumulate_grad_batches: 4

checkpoint_dir: data/models/stageA_v5_s1fusion
patience: 15
monitor: val/mIoU
monitor_mode: max
