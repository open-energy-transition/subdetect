# Stage A v2: S2-only TerraMind fine-tuning, retrained 2026-07-08 with a 20000 m2
# positive-class floor (data/chips rebuilt from configs/aoi.yaml min_sub_area_m2=20000)
# and a stronger focal-Tversky recall lean, after the v1 model underfit even on
# training data (train IoU_1 <= 0.11) with the old 1000 m2 floor dominated by
# unlearnable small substations.

data:
  # Merged india_pilot + pakistan(x2) chip index, rebuilt with the 20000 m2 floor.
  index_path: data/chips/combined/index.parquet
  batch_size: 8
  num_workers: 4
  modalities: [S2L2A]        # single-modality -> datamodule returns a plain tensor

task:
  model_factory: EncoderDecoderFactory
  model_args:
    backbone: terramind_v1_tiny   # fits the GTX 1060; the _small backbone scored worse (val IoU 0.049 vs 0.068)
    backbone_pretrained: true
    backbone_modalities: [S2L2A]
    backbone_bands:
      S2L2A: [BLUE, GREEN, RED, RED_EDGE_1, RED_EDGE_2, RED_EDGE_3,
              NIR_BROAD, NIR_NARROW, SWIR_1, SWIR_2]
    necks:
      - name: SelectIndices
        indices: [2, 5, 8, 11]
      - name: ReshapeTokensToImage
        remove_cls_token: false
      - name: LearnedInterpolateToPyramidal
    decoder: UNetDecoder
    decoder_channels: [256, 128, 64, 32]
    num_classes: 2
    rescale: true
  # Recall-first focal Tversky: beta>alpha penalises false negatives harder, and
  # gamma>1 focuses the loss on hard (currently-misclassified) positive pixels --
  # both aimed at the imbalance that suppressed IoU_1 in v1 (0.4/0.6/1.0). Still
  # short of earthpv's 0.3/0.7 recall-flood collapse point.
  loss: tversky
  tversky_args: {alpha: 0.35, beta: 0.65, gamma: 1.33}
  class_weights: [0.25, 0.75]
  ignore_index: -1
  lr: 1.0e-4
  optimizer: AdamW
  optimizer_hparams:
    weight_decay: 0.05
  freeze_backbone: false
  plot_on_val: false

trainer:
  # v1 runs stopped (patience=10) with IoU_1 still rising; give it more room.
  max_epochs: 100
  accumulate_grad_batches: 2

checkpoint_dir: data/models/stageA_v2_20k
patience: 20
# Monitor val/mIoU, NOT val/Accuracy: macro recall is maximised by the recall-flood
# (predict-positive-everywhere) failure mode, so it selected a useless checkpoint. mIoU
# rewards precise overlap, selecting a model that actually localises substations.
monitor: val/mIoU
monitor_mode: max
