# v9 retrain: identical recipe/arch/loss to terramind_sub_v9_s2only.yaml, but on the
# fixed chip index (data/chips_v9/combined/index.parquet regenerated after the val-split
# fix -- see MEMORY subdetect-val-split-fix). Val is now the clean Pakistan/Sindh
# geographic holdout only (279 chips, was 3,013 -- 91% of which were random-split,
# out-of-domain TorchGeo positives). The torchgeo chips that used to be held out as val
# are now train, so this run also sees slightly more training data than the original v9
# -- not a purely isolated variable, but unavoidable given the fix. Compare against
# production v9 (data/models/stageA_v9_s2only) via scripts/field_eval.py on sindh_test,
# not val/mIoU or val/IoU_1 directly (not comparable across the index rebuild).
data:
  index_path: data/chips_v9/combined/index.parquet
  batch_size: 8
  num_workers: 4
  modalities: [S2L2A]

task:
  model_factory: EncoderDecoderFactory
  model_args:
    backbone: terramind_v1_tiny
    backbone_pretrained: true
    backbone_modalities: [S2L2A]
    backbone_bands:
      S2L2A: [BLUE, GREEN, RED, RED_EDGE_1, RED_EDGE_2, RED_EDGE_3,
              NIR_BROAD, NIR_NARROW, SWIR_1, SWIR_2]
    necks:
      - name: SelectIndices
        indices: [2, 5, 8, 11]
      - name: ReshapeTokensToImage
        remove_cls_token: false
      - name: LearnedInterpolateToPyramidal
    decoder: UNetDecoder
    decoder_channels: [256, 128, 64, 32]
    num_classes: 2
    rescale: true
  loss: tversky
  tversky_args: {alpha: 0.35, beta: 0.65, gamma: 1.33}
  class_weights: [0.25, 0.75]
  ignore_index: -1
  lr: 1.0e-4
  optimizer: AdamW
  optimizer_hparams:
    weight_decay: 0.05
  freeze_backbone: false
  plot_on_val: false

trainer:
  max_epochs: 60
  accumulate_grad_batches: 2

checkpoint_dir: data/models/stageA_v9_retrain_s2only
patience: 15
monitor: val/IoU_1
monitor_mode: max
