# Stage A v3b: same hard-negative fix as v3_hardneg, but at half dose (~450
# negatives instead of 900) -- v3_hardneg (1x positives) overcorrected: val
# false positives dropped 5.6x but recall also fell below the pre-fix v2
# baseline (>20k m2 60%->35%, >=220kV 85.7%->57.1%). Warm-starts fresh from
# v2_india (NOT v3_hardneg) so this is a clean single-variable comparison at a
# different hard-negative dose, not a further correction stacked on v3.

data:
  index_path: data/chips/combined/index.parquet
  batch_size: 8
  num_workers: 4
  modalities: [S2L2A]

task:
  model_factory: EncoderDecoderFactory
  model_args:
    backbone: terramind_v1_tiny
    backbone_pretrained: true
    backbone_modalities: [S2L2A]
    backbone_bands:
      S2L2A: [BLUE, GREEN, RED, RED_EDGE_1, RED_EDGE_2, RED_EDGE_3,
              NIR_BROAD, NIR_NARROW, SWIR_1, SWIR_2]
    necks:
      - name: SelectIndices
        indices: [2, 5, 8, 11]
      - name: ReshapeTokensToImage
        remove_cls_token: false
      - name: LearnedInterpolateToPyramidal
    decoder: UNetDecoder
    decoder_channels: [256, 128, 64, 32]
    num_classes: 2
    rescale: true
  loss: tversky
  tversky_args: {alpha: 0.35, beta: 0.65, gamma: 1.33}
  class_weights: [0.25, 0.75]
  ignore_index: -1
  lr: 5.0e-5
  optimizer: AdamW
  optimizer_hparams:
    weight_decay: 0.05
  freeze_backbone: false
  plot_on_val: false

init_weights_from: data/models/stageA_v2_india/terramind-sub-epoch=01-step=152.ckpt

trainer:
  max_epochs: 60
  accumulate_grad_batches: 2

checkpoint_dir: data/models/stageA_v3b_hardneg_half
patience: 15
monitor: val/mIoU
monitor_mode: max
