# v7: voltage-tag-only ablation. Same recipe as v5 (india_pilot + pakistan:2 +
# pakistan_hardneg, no yunnan_hardneg, no size floor, raw/unrefined OSM labels) but
# chips built with --voltage-only: only substations with a valid OSM `voltage` tag
# train as positive (untagged ones demoted to ignore, not taught as background).
# Tests whether restricting to voltage-tagged (typically more reliably/tightly drawn,
# per the label-refinement investigation -- Pakistan's voltage-tagged polygons were
# rarely oversized vs untagged ones) substations improves quality despite a real cut
# in training-positive volume: only 26.7% of Pakistan / 46.0% of India substations
# carry a voltage tag, so this combined index is 2,049 chips vs v5's 4,730 (-57%).
# Given "data quantity is the recall lever" (see memory), expect a real risk of
# under-fitting/recall loss purely from data starvation, separate from any label-
# quality benefit. Compare against v5 (and v6b/v6c) via evaluate.py size buckets +
# eval_polygonize_v2.py on sindh_test, same methodology as the other ablations.
data:
  index_path: data/chips_v7/combined/index.parquet
  batch_size: 8
  num_workers: 4
  modalities: [S1RTC]

task:
  model_factory: EncoderDecoderFactory
  model_args:
    backbone: terramind_v1_tiny
    backbone_pretrained: true
    backbone_modalities: [S1RTC]
    backbone_bands:
      S1RTC: [VV, VH]
    necks:
      - name: SelectIndices
        indices: [2, 5, 8, 11]
      - name: ReshapeTokensToImage
        remove_cls_token: false
      - name: LearnedInterpolateToPyramidal
    decoder: UNetDecoder
    decoder_channels: [256, 128, 64, 32]
    num_classes: 2
    rescale: true
  loss: tversky
  tversky_args: {alpha: 0.35, beta: 0.65, gamma: 1.33}
  class_weights: [0.25, 0.75]
  ignore_index: -1
  lr: 1.0e-4
  optimizer: AdamW
  optimizer_hparams:
    weight_decay: 0.05
  freeze_backbone: false
  plot_on_val: false

trainer:
  max_epochs: 60
  accumulate_grad_batches: 2

checkpoint_dir: data/models/stageA_v7_s1only
patience: 15
monitor: val/mIoU
monitor_mode: max
